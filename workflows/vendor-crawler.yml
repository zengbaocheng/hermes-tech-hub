name: 🌐 Vendor Crawler

on:
  schedule:
    # 每周日凌晨 3 点自动爬取
    - cron: '0 3 * * 0'
  workflow_dispatch:
    # 手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run crawler
        run: |
          chmod +x scripts/tools/hermes-tech-crawler.sh
          ./scripts/tools/hermes-tech-crawler.sh

      - name: Commit & Push
        run: |
          git config user.name "hermes-tech-crawler"
          git config user.email "bot@hermes-tech-hub"
          git add -A
          git diff --quiet && echo "No changes" || (
            git commit -m "vendors: 自动爬取更新 $(date +'%Y-%m-%d')"
            git push
          )